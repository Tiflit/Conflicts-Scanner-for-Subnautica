name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore ./src/ConflictScanner/ConflictScanner.csproj

    - name: Build
      run: dotnet build ./src/ConflictScanner/ConflictScanner.csproj --configuration Release --no-restore

    - name: Publish (self-contained)
      run: dotnet publish ./src/ConflictScanner/ConflictScanner.csproj -c Release -r win-x64 --self-contained true -o ./publish

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ConflictScanner-win-x64
        path: publish
